<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JPG 변환기</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <link rel="stylesheet" href="/static/style.css?v={{ static_version('static/style.css') }}">
	<link rel="icon" type="image/png" href="/static/favicon/favicon-96x96.png?v=20260620" sizes="96x96">
	<link rel="icon" type="image/svg+xml" href="/static/favicon/favicon.svg?v=20260620">
	<link rel="shortcut icon" href="/static/favicon/favicon.ico?v=20260620">
	<link rel="apple-touch-icon" sizes="180x180" href="/static/favicon/apple-touch-icon.png?v=20260620">
	<meta name="apple-mobile-web-app-title" content="toJPG">
	<link rel="manifest" href="/static/favicon/site.webmanifest?v=20260620">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>toJPG</h1>
            <button id="themeToggleBtn">테마 변경</button>
        </div>
        <div class="controls">
            <input type="file" id="imageInput" multiple accept="image/*">
            <button id="clearAllBtn" class="btn-danger">모두 삭제</button>
            <label for="qualitySelect">품질:</label>
            <select id="qualitySelect"></select>
        </div>
        <p class="upload-hint">최대 200개 파일, 파일당 최대 10MB까지 업로드 가능합니다.</p>
        <ul id="fileListContainer"></ul>
        <p id="fileSummary" class="file-summary"></p>
        <div class="turnstile-container">
            <div class="cf-turnstile" data-sitekey="{{ sitekey }}"></div>
        </div>
        <button id="convertSubmitBtn" style="width: 100%;">변환 시작</button>
        <div id="conversionResultArea" class="result-area" style="display: none;">
            <div class="header">
                <h3>변환 완료</h3>
                <div>
                    <button id="downloadZipBtn">ZIP으로 모두 다운로드</button>
                    <button id="clearResultsBtn" class="btn-danger">결과 모두 삭제</button>
                </div>
            </div>
            <ul id="convertedListContainer"></ul>
        </div>
    </div>
    <script defer src="/static/script.js?v={{ static_version('static/script.js') }}"></script>
</body>
</html>
